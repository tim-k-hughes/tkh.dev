<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | tkh.dev</title>
    <meta name="theme-color" content="#902923">
    <link rel="icon" href="/assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Plus+Jakarta+Sans:wght@200..800&amp;family=Space+Grotesk:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/script.js"></script>
  </head>
  <body data-page="404">
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="page-glow page-glow-left" aria-hidden="true"></div>
    <div class="page-glow page-glow-right" aria-hidden="true"></div>

    <main id="content" class="shell error-shell">
      <section class="panel error-card" data-reveal>
        <div class="error-brand">
          <img class="error-logo" src="/assets/logo-red.png" alt="" aria-hidden="true">
        </div>
        <p class="eyebrow">404</p>
        <h1>This path does not exist yet.</h1>
        <p class="lead">
          tkh.dev is designed to grow by route, so this usually means the page has not been built
          yet or the path changed.
        </p>
        <div class="cta-row">
          <a class="button button-primary" href="/">Back home</a>
          <a class="button button-secondary" href="/projects/">Browse project paths</a>
        </div>
      </section>
    </main>
  </body>
</html>
