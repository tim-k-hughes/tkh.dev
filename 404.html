<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | tkh.dev</title>
    <meta name="theme-color" content="#902923">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/script.js"></script>
  </head>
  <body data-page="404">
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="page-glow page-glow-left" aria-hidden="true"></div>
    <div class="page-glow page-glow-right" aria-hidden="true"></div>

    <main id="content" class="error-shell shell">
      <section class="panel error-card" data-reveal>
        <a class="error-brand" href="/">
          <img class="error-logo" src="/assets/logo.svg" alt="" aria-hidden="true">
          <span class="visually-hidden">tkh.dev</span>
        </a>
        <p class="eyebrow">404</p>
        <h1>This path does not exist yet.</h1>
        <p>
          tkh.dev is designed to grow by route, so this probably means the page has not been built
          yet or the path changed.
        </p>
        <div class="cta-row">
          <a class="button button-primary" href="/">Back home</a>
          <a class="button button-secondary" href="/projects/">Browse project paths</a>
        </div>
      </section>
    </main>
  </body>
</html>
